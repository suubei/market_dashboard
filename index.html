<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Dashboard · VARS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --surface: #f6f8fa;
      --border:  #d0d7de;
      --text:    #1f2328;
      --muted:   #57606a;
      --accent:  #0969da;
      --pos:     #1a7f37;
      --neg:     #cf222e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 56px;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 auto 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }

    #meta {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    #meta b { color: var(--text); }

    /* ── Status banner ── */
    #status {
      max-width: 900px;
      margin: 0 auto 20px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      display: none;
    }
    #status.error { border-color: var(--neg); color: var(--neg); }

    /* ── Main table ── */
    #dashboard {
      max-width: 900px;
      margin: 0 auto;
      display: none;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .ticker-table {
      width: 100%;
      border-collapse: collapse;
    }

    /* Column widths */
    .col-name  { width: 70px; }
    .col-value { width: 72px; }
    .col-chart { /* fills rest */ }

    .ticker-row {
      border-top: 1px solid var(--border);
    }
    .ticker-row:last-child { border-bottom: 1px solid var(--border); }

    .ticker-row td {
      padding: 10px 0;
      vertical-align: middle;
    }
    .ticker-row td.col-name {
      padding-right: 12px;
    }
    .ticker-row td.col-value {
      padding-right: 16px;
      text-align: right;
    }

    .ticker-name {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .ticker-value {
      font-size: 0.88rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .ticker-value.pos { color: var(--pos); }
    .ticker-value.neg { color: var(--neg); }
    .ticker-value.zero { color: var(--muted); }

    .histogram-cell { padding-right: 4px; }

    .histogram-wrap {
      position: relative;
      width: 100%;
    }
    .histogram-wrap svg {
      display: block;
      width: 100%;
      height: 64px;
      overflow: visible;
    }

    /* Date axis labels under the histograms */
    .date-axis {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      padding: 0 1px;
    }

    /* ── Footer ── */
    footer {
      max-width: 900px;
      margin: 28px auto 0;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Market Dashboard</h1>
  <div id="meta">
    <span>数据日期：<b id="data-date">—</b></span>
    <span>更新时间：<b id="update-time">—</b>（北京时间）</span>
  </div>
</header>

<div id="status"></div>

<div id="dashboard">
  <table class="ticker-table" id="ticker-table">
    <colgroup>
      <col class="col-name">
      <col class="col-value">
      <col class="col-chart">
    </colgroup>
    <tbody id="ticker-body"></tbody>
  </table>
  <div class="date-axis" id="date-axis">
    <span id="date-start">—</span>
    <span id="date-end">—</span>
  </div>
</div>

<footer>
  <span>数据：<a href="https://www.tiingo.com" target="_blank">Tiingo</a></span>
  <span>每日北京时间 06:00 自动更新</span>
</footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.classList.toggle('error', isError);
}

function toBeiJing(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleString('zh-CN', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
  });
}

// ── SVG Histogram ─────────────────────────────────────────────────────────────
// All histograms share the same maxAbsVal so magnitudes are comparable.
const VB_W = 500, VB_H = 60;
const ZERO_Y  = VB_H / 2;         // 30 — zero line
const MAX_BAR = ZERO_Y - 4;       // 26px — max bar height each direction
const N_BARS  = 25;
const SLOT_W  = VB_W / N_BARS;    // 20px per slot
const BAR_W   = SLOT_W - 2;       // 18px bar, 2px gap
const POS_CLR = '#1a7f37';
const NEG_CLR = '#cf222e';
const LAST_POS = '#2da44e';        // slightly brighter for the latest bar
const LAST_NEG = '#e5534b';

function buildHistogramSVG(values, maxAbsVal) {
  const lastIdx = values.length - 1;
  const bars = values.map((v, i) => {
    if (v === null || v === undefined || isNaN(v)) return '';
    const isPos  = v >= 0;
    const isLast = i === lastIdx;
    const barH   = maxAbsVal > 0 ? (Math.abs(v) / maxAbsVal * MAX_BAR) : 0;
    const x      = i * SLOT_W + 1;
    const y      = isPos ? ZERO_Y - barH : ZERO_Y;
    const fill   = isLast ? (isPos ? LAST_POS : LAST_NEG)
                           : (isPos ? POS_CLR  : NEG_CLR);
    const tip    = `${v >= 0 ? '+' : ''}${v.toFixed(4)}`;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${Math.max(barH, 0.5).toFixed(1)}" fill="${fill}" rx="1"><title>${tip}</title></rect>`;
  }).join('');

  return `<svg viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none">
    <line x1="0" y1="${ZERO_Y}" x2="${VB_W}" y2="${ZERO_Y}" stroke="#d0d7de" stroke-width="1"/>
    ${bars}
  </svg>`;
}

// ── Render rows ───────────────────────────────────────────────────────────────
function renderDashboard(latest) {
  const series  = latest.vars_series ?? {};
  const vars    = latest.vars;
  const tickers = Object.keys(vars);

  // Shared Y-scale: max |VARS| across all tickers and all 25 days
  const allVals = tickers.flatMap(t => series[t] ?? []).filter(v => v !== null);
  const maxAbs  = Math.max(...allVals.map(Math.abs), 0.01);

  const tbody = document.getElementById('ticker-body');

  // Sort by current VARS descending
  const sorted = [...tickers].sort((a, b) => vars[b] - vars[a]);

  tbody.innerHTML = sorted.map(ticker => {
    const val    = vars[ticker];
    const cls    = val > 0 ? 'pos' : val < 0 ? 'neg' : 'zero';
    const label  = (val >= 0 ? '+' : '') + val.toFixed(2);
    const values = series[ticker] ?? [];
    const svg    = buildHistogramSVG(values, maxAbs);

    return `<tr class="ticker-row">
      <td class="col-name"><span class="ticker-name">${ticker}</span></td>
      <td class="col-value"><span class="ticker-value ${cls}">${label}</span></td>
      <td class="histogram-cell">
        <div class="histogram-wrap">${svg}</div>
      </td>
    </tr>`;
  }).join('');

  // Date axis labels
  const dates = series.dates ?? [];
  if (dates.length >= 2) {
    document.getElementById('date-start').textContent = dates[0].slice(5);    // MM-DD
    document.getElementById('date-end').textContent   = dates[dates.length - 1].slice(5);
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(async () => {
  try {
    const latest = await fetch('./data/latest.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });

    if (!latest.date) {
      showStatus('数据尚未生成，等待首次 GitHub Actions 运行（北京时间每日 06:00）。');
      return;
    }

    document.getElementById('data-date').textContent   = latest.date;
    document.getElementById('update-time').textContent = toBeiJing(latest.updated_at);

    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(latest);

  } catch (err) {
    showStatus('数据加载失败：' + err.message, true);
    console.error(err);
  }
})();
</script>
</body>
</html>
