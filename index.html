<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Dashboard · VARS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --surface: #f6f8fa;
      --border:  #d0d7de;
      --text:    #1f2328;
      --muted:   #57606a;
      --accent:  #0969da;
      --pos:     #1a7f37;
      --neg:     #cf222e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 28px 15vw 56px;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 0 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }
    #meta {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    #meta b { color: var(--text); }

    /* ── Status banner ── */
    #status {
      max-width: 900px;
      margin: 0 0 20px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      display: none;
    }
    #status.error { border-color: var(--neg); color: var(--neg); }

    /* ── Main table ── */
    #dashboard {
      max-width: 900px;
      margin: 0;
      display: none;
    }

    .ticker-table {
      width: 100%;
      border-collapse: collapse;
    }

    .col-market { width: 100px; }
    .col-index  { width: 80px; }
    .col-rs     { width: 90px; }
    .col-sts    { width: 80px; }
    .col-chg    { width: 90px; }

    /* Header row */
    .ticker-table thead th {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 0 4px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .ticker-table thead th.col-rs  { padding-left: 8px; }
    .ticker-table thead th.col-sts { text-align: center; }

    .sts-cell { text-align: center; }
    .sts-value {
      font-size: 0.88rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .sts-high { color: var(--pos); }
    .sts-low  { color: var(--neg); }
    .sts-mid  { color: var(--muted); }

    /* chg cell: bar background + text overlay */
    .chg-cell { padding: 0 !important; }
    .chg-wrap {
      position: relative;
      padding: 3px 6px;
      text-align: center;
    }
    .chg-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .chg-text {
      position: relative;
      font-size: 0.88rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    /* Data rows */
    .ticker-row { border-top: 1px solid var(--border); }
    .ticker-row:last-child { border-bottom: 1px solid var(--border); }

    .ticker-row td {
      padding: 3px 0;
      vertical-align: middle;
    }

    .market-cell { padding-right: 16px; }
    .index-cell  { padding-right: 16px; color: var(--muted); font-size: 0.85rem; }

    .ticker-symbol {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
    }

    .rs-cell { padding-left: 8px; }

    .histogram-wrap svg {
      display: block;
      width: 100%;
      height: 24px;
      overflow: visible;
    }

    /* ── Footer ── */
    footer {
      max-width: 900px;
      margin: 28px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Market Dashboard</h1>
  <div id="meta">
    <span>数据日期：<b id="data-date">—</b></span>
    <span>更新时间：<b id="update-time">—</b>（北京时间）</span>
  </div>
</header>

<div id="status"></div>

<div id="dashboard">
  <table class="ticker-table">
    <colgroup>
      <col class="col-market">
      <col class="col-index">
      <col class="col-rs">
      <col class="col-sts">
      <col class="col-chg">
    </colgroup>
    <thead>
      <tr>
        <th class="col-market">Market</th>
        <th class="col-index">Index</th>
        <th class="col-rs">1-Month RS</th>
        <th class="col-sts">RS_STS%</th>
        <th class="col-chg" style="text-align:center">% Daily Change</th>
      </tr>
    </thead>
    <tbody id="ticker-body"></tbody>
  </table>

  <table class="ticker-table" style="margin-top:24px">
    <colgroup>
      <col class="col-market">
      <col class="col-index">
      <col class="col-rs">
      <col class="col-sts">
      <col class="col-chg">
    </colgroup>
    <thead>
      <tr>
        <th class="col-market">Sub-Market</th>
        <th class="col-index">Ticker</th>
        <th class="col-rs">1-Month RS</th>
        <th class="col-sts">RS_STS%</th>
        <th class="col-chg" style="text-align:center">% Daily Change</th>
      </tr>
    </thead>
    <tbody id="sub-ticker-body"></tbody>
  </table>
</div>

<footer>
  <span>数据：<a href="https://www.tiingo.com" target="_blank">Tiingo</a></span>
  <span>每日北京时间 06:00 自动更新</span>
</footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.classList.toggle('error', isError);
}

function toBeiJing(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleString('zh-CN', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
  });
}

// ── PERCENTRANK (matches Excel's PERCENTRANK) ─────────────────────────────────
// = count of values strictly below x / (n - 1)
function percentRank(values, val) {
  const valid = values.filter(v => v !== null && !isNaN(v));
  const n = valid.length;
  if (n <= 1) return null;
  const below = valid.filter(v => v < val).length;
  return below / (n - 1);
}

// ── Config ────────────────────────────────────────────────────────────────────
const DISPLAY_ORDER = [
  { ticker: 'SPY',  market: 'SPY 500'  },
  { ticker: 'RSP',  market: 'RSP 500'  },
  { ticker: 'QQQ',  market: 'QQQ 100'  },
  { ticker: 'QQQE', market: 'QQQE 100' },
  { ticker: 'IWM',  market: 'IWM 2000' },
  { ticker: 'DIA',  market: 'DIA 30'   },
];

const SUB_DISPLAY_ORDER = [
  { ticker: 'IJS', market: 'S&P Small-Cap 600 Value'  },
  { ticker: 'IJT', market: 'S&P Small-Cap 600 Growth' },
  { ticker: 'IJJ', market: 'S&P Mid-Cap 400 Value'    },
  { ticker: 'IJK', market: 'S&P Mid-Cap 400 Growth'   },
  { ticker: 'IVE', market: 'S&P Large-Cap 500 Value'  },
  { ticker: 'IVW', market: 'S&P Large-Cap 500 Growth' },
];

// ── SVG Histogram ─────────────────────────────────────────────────────────────
const VB_W    = 200;   // narrow viewBox
const VB_H    = 48;
const ZERO_Y  = VB_H / 2;          // 24
const MAX_BAR = ZERO_Y - 3;        // 21px max bar height
const N_BARS  = 25;
const SLOT_W  = VB_W / N_BARS;     // 8px per slot
const BAR_W   = SLOT_W - 2;        // 6px bar, 2px gap
const POS_CLR  = '#1a7f37';
const NEG_CLR  = '#cf222e';
const LAST_POS = '#2da44e';
const LAST_NEG = '#e5534b';
const SPY_CLR  = '#8c959f';        // flat neutral for SPY reference

function buildHistogramSVG(values, isSpy) {
  const maxAbs  = isSpy ? 1 : Math.max(...values.filter(v => v !== null).map(Math.abs), 0.01);
  const maxVal  = isSpy ? 0 : Math.max(...values.filter(v => v !== null));
  const maxIdx  = isSpy ? -1 : values.indexOf(maxVal);

  const bars = values.map((v, i) => {
    if (v === null || v === undefined || isNaN(v)) return '';
    const isPos    = v >= 0;
    const isMaxBar = i === maxIdx;
    const barH   = maxAbs > 0 ? (Math.abs(v) / maxAbs * MAX_BAR) : 0;
    const x      = i * SLOT_W + 1;
    const y      = isPos ? ZERO_Y - barH : ZERO_Y;
    const fill   = isSpy    ? SPY_CLR
                 : isMaxBar ? (isPos ? LAST_POS : LAST_NEG)
                             : (isPos ? POS_CLR  : NEG_CLR);
    const tip    = `${v >= 0 ? '+' : ''}${v.toFixed(4)}`;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${Math.max(barH, 0.5).toFixed(1)}" fill="${fill}" rx="0"><title>${tip}</title></rect>`;
  }).join('');

  return `<svg viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none">
    <line x1="0" y1="${ZERO_Y}" x2="${VB_W}" y2="${ZERO_Y}" stroke="#d0d7de" stroke-width="0.8"/>
    ${bars}
  </svg>`;
}

// ── Daily change bar SVG ──────────────────────────────────────────────────────
// mode: 'butterfly' | 'allPos' | 'allNeg'
function buildChgBarSVG(val, mode, maxAbs) {
  if (val === null) return '';
  const isPos  = val >= 0;
  const frac   = maxAbs > 0 ? Math.abs(val) / maxAbs : 0;
  const posClr = 'rgba(26,127,55,0.18)';
  const negClr = 'rgba(207,34,46,0.15)';
  const fill   = isPos ? posClr : negClr;

  let x, w, centerLine = '';

  if (mode === 'butterfly') {
    w = frac * 50;
    x = isPos ? 50 : 50 - w;
    centerLine = `<line x1="50" y1="0" x2="50" y2="1" stroke="#d0d7de" stroke-width="0.8"/>`;
  } else if (mode === 'allPos') {
    x = 0; w = frac * 100;
  } else {                        // allNeg: bars extend from right
    w = frac * 100; x = 100 - w;
  }

  return `<svg viewBox="0 0 100 1" preserveAspectRatio="none">
    <rect x="${x.toFixed(2)}" y="0" width="${w.toFixed(2)}" height="1" fill="${fill}"/>
    ${centerLine}
  </svg>`;
}

// ── Render a section's tbody ──────────────────────────────────────────────────
function renderSection(displayOrder, tbodyId, series, vars, changes) {
  const tbody  = document.getElementById(tbodyId);
  const isSPY  = t => t === 'SPY';

  // Shared daily-change axis for this section
  const allChg = displayOrder.map(({ ticker }) => changes[ticker]).filter(v => v != null);
  const hasPos = allChg.some(v => v > 0);
  const hasNeg = allChg.some(v => v < 0);
  const maxAbs = Math.max(...allChg.map(Math.abs), 0.01);
  const chgMode = (hasPos && hasNeg) ? 'butterfly' : hasPos ? 'allPos' : 'allNeg';

  tbody.innerHTML = displayOrder.map(({ ticker, market }) => {
    const spy    = isSPY(ticker);
    const values = spy ? Array(25).fill(0) : (series[ticker] ?? []);
    const svg    = buildHistogramSVG(values, spy);

    // RS_STS%
    let stsHtml = '<span class="sts-value sts-mid">—</span>';
    if (!spy && values.length) {
      const pr = percentRank(values, values[values.length - 1]);
      if (pr !== null) {
        const pct = Math.round(pr * 100);
        const cls = pct >= 80 ? 'sts-high' : pct <= 20 ? 'sts-low' : 'sts-mid';
        stsHtml = `<span class="sts-value ${cls}">${pct}%</span>`;
      }
    }

    // % Daily Change
    const chg    = changes[ticker] ?? null;
    const barSvg = buildChgBarSVG(chg, chgMode, maxAbs);
    const chgText = chg !== null ? `${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%` : '—';

    return `<tr class="ticker-row">
      <td class="market-cell"><span class="ticker-symbol">${market}</span></td>
      <td class="index-cell">${ticker}</td>
      <td class="rs-cell"><div class="histogram-wrap">${svg}</div></td>
      <td class="sts-cell" style="text-align:center">${stsHtml}</td>
      <td class="chg-cell">
        <div class="chg-wrap">${barSvg}<span class="chg-text">${chgText}</span></div>
      </td>
    </tr>`;
  }).join('');
}

// ── Render dashboard ──────────────────────────────────────────────────────────
function renderDashboard(latest) {
  const series  = latest.vars_series ?? {};
  const vars    = latest.vars ?? {};
  const changes = latest.daily_change ?? {};

  renderSection(DISPLAY_ORDER,     'ticker-body',     series, vars, changes);
  renderSection(SUB_DISPLAY_ORDER, 'sub-ticker-body', series, vars, changes);
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(async () => {
  try {
    const latest = await fetch('./data/latest.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });

    if (!latest.date) {
      showStatus('数据尚未生成，等待首次 GitHub Actions 运行（北京时间每日 06:00）。');
      return;
    }

    document.getElementById('data-date').textContent   = latest.date;
    document.getElementById('update-time').textContent = toBeiJing(latest.updated_at);

    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(latest);

  } catch (err) {
    showStatus('数据加载失败：' + err.message, true);
    console.error(err);
  }
})();
</script>
</body>
</html>
