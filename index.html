<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Dashboard · VARS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #ffffff;
      --surface:#f6f8fa;
      --border: #d0d7de;
      --text:   #1f2328;
      --muted:  #57606a;
      --accent: #0969da;
      --pos:    #1a7f37;
      --neg:    #cf222e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 28px 15vw 56px;
    }

    header {
      max-width: 900px;
      margin: 0 0 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    #meta {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    #meta b { color: var(--text); }

    #status {
      max-width: 900px;
      margin: 0 0 20px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      display: none;
    }
    #status.error { border-color: var(--neg); color: var(--neg); }

    #dashboard { max-width: 900px; display: none; }

    .ticker-table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    .col-market    { width: 210px; }
    .col-index     { width: 70px; }
    .col-rs        { width: 85px; }
    .col-sts       { width: 90px; }
    .col-intraday  { width: 110px; }
    .col-chg       { width: 110px; }
    .col-weekly    { width: 110px; }
    .col-atr-low   { width: 155px; }
    .col-atr-wkchg { width: 110px; }
    .col-atr-high  { width: 155px; }
    .col-atr-hchg  { width: 110px; }

    .ticker-table thead th {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 4px 0;
      background: #e8ecf0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .ticker-table thead th.col-sts,
    .ticker-table thead th.col-atr-low,
    .ticker-table thead th.col-atr-high { white-space: nowrap; }
    .ticker-table thead th.sortable { cursor: pointer; user-select: none; }
    .ticker-table thead th.sortable:hover { background: #d8dde3; }
    .ticker-table thead th.sort-active { color: var(--text); }
    .sort-arrow { margin-left: 3px; font-size: 0.65rem; opacity: 0.5; }
    .sort-active .sort-arrow { opacity: 1; }

    .ticker-row {
      height: 32px;
      border-top: 1px solid var(--border);
    }
    .ticker-row:last-child { border-bottom: 1px solid var(--border); }
    .ticker-row td {
      padding: 0;
      height: 32px;
      line-height: 32px;
      vertical-align: middle;
      overflow: hidden;
    }

    .market-cell { text-align: left; white-space: nowrap; overflow: hidden; }
    .index-cell  { text-align: center; color: var(--muted); font-size: 0.85rem; }
    .ticker-symbol { font-size: 0.88rem; font-weight: 700; }

    .rs-cell { line-height: 0; }
    .rs-cell svg { display: block; width: 100%; height: 32px; }

    .sts-cell, .atr-cell { text-align: right; padding-right: 8px; }
    .num-value { font-size: 0.88rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }
    .atr-new-high { color: var(--pos); }
    .atr-neg      { color: var(--neg); }

    .chg-cell { padding: 0 !important; }
    .chg-wrap { position: relative; padding: 0 6px; text-align: right; }
    .chg-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .chg-text { position: relative; font-size: 0.88rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }

    footer {
      max-width: 900px;
      margin: 28px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Market Dashboard</h1>
  <div id="meta">
    <span>数据日期：<b id="data-date">—</b></span>
    <span>更新时间：<b id="update-time">—</b>（北京时间）</span>
  </div>
</header>

<div id="status"></div>

<div id="dashboard"></div>

<footer>
  <span>数据：<a href="https://www.tiingo.com" target="_blank">Tiingo</a></span>
  <span>每日北京时间 06:00 自动更新</span>
</footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.classList.toggle('error', isError);
}

function toBeiJing(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleString('zh-CN', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
  });
}

// PERCENTRANK: count of values strictly below x / (n - 1)  — matches Excel
function percentRank(values, val) {
  const valid = values.filter(v => v !== null && !isNaN(v));
  if (valid.length <= 1) return null;
  return valid.filter(v => v < val).length / (valid.length - 1);
}

// ── Table builder ─────────────────────────────────────────────────────────────
function buildTable(section) {
  const id = `${section.id}-body`;
  const colClass = { sts: 'col-sts', intraday: 'col-intraday', chg: 'col-chg', weekly: 'col-weekly', atrLow: 'col-atr-low', atrWkChg: 'col-atr-wkchg', atrHigh: 'col-atr-high', atrHChg: 'col-atr-hchg' };
  const sortTh = (col, label) =>
    `<th class="${colClass[col]} sortable" data-sort="${col}" data-tbody="${id}">${label}<span class="sort-arrow"></span></th>`;
  return `<table class="ticker-table">
    <colgroup>
      <col class="col-market"><col class="col-index">
      <col class="col-rs"><col class="col-sts">
      <col class="col-intraday"><col class="col-chg">
      <col class="col-weekly">
      <col class="col-atr-low"><col class="col-atr-wkchg">
      <col class="col-atr-high"><col class="col-atr-hchg">
    </colgroup>
    <thead><tr>
      <th class="col-market">${section.label}</th>
      <th class="col-index">Symbol</th>
      <th class="col-rs">1-Month RS</th>
      ${sortTh('sts', 'RS_STS%')}
      ${sortTh('intraday', 'Intraday %')}
      ${sortTh('chg', 'Daily %')}
      ${sortTh('weekly', 'Weekly %')}
      ${sortTh('atrLow', '52WL Dist (ATR%)')}
      ${sortTh('atrWkChg', '52WL Chg')}
      ${sortTh('atrHigh', '52WH Dist (ATR%)')}
      ${sortTh('atrHChg', '52WH Chg')}
    </tr></thead>
    <tbody id="${id}"></tbody>
  </table>`;
}

// ── SVG: VARS histogram ───────────────────────────────────────────────────────
const VB_W   = 200, VB_H = 48;
const ZERO_Y = VB_H / 2;
const MAX_BAR = ZERO_Y - 3;
const N_BARS  = 25;
const SLOT_W  = VB_W / N_BARS;
const BAR_W   = SLOT_W - 2;

function buildHistogramSVG(values, isSpy) {
  const maxAbs = isSpy ? 1 : Math.max(...values.filter(v => v !== null).map(Math.abs), 0.01);
  const maxVal = isSpy ? 0 : Math.max(...values.filter(v => v !== null));
  const maxIdx = isSpy ? -1 : values.indexOf(maxVal);

  const bars = values.map((v, i) => {
    if (v == null || isNaN(v)) return '';
    const isPos = v >= 0, isMax = i === maxIdx;
    const barH  = Math.abs(v) / maxAbs * MAX_BAR;
    const x = i * SLOT_W + 1;
    const y = isPos ? ZERO_Y - barH : ZERO_Y;
    const fill = isSpy  ? '#8c959f'
               : isMax  ? (isPos ? '#2da44e' : '#e5534b')
                        : (isPos ? '#1a7f37' : '#cf222e');
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${Math.max(barH, 0.5).toFixed(1)}" fill="${fill}"><title>${v >= 0 ? '+' : ''}${v.toFixed(4)}</title></rect>`;
  }).join('');

  return `<svg viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none">
    <line x1="0" y1="${ZERO_Y}" x2="${VB_W}" y2="${ZERO_Y}" stroke="#d0d7de" stroke-width="0.8"/>
    ${bars}</svg>`;
}

// ── SVG: daily change butterfly bar ──────────────────────────────────────────
function buildChgBarSVG(val, mode, maxAbs) {
  if (val == null) return '';
  const isPos = val >= 0;
  const frac  = Math.abs(val) / maxAbs;
  const fill  = isPos ? 'rgba(26,127,55,0.18)' : 'rgba(207,34,46,0.15)';
  let x, w, centerLine = '';

  if (mode === 'butterfly') {
    w = frac * 50; x = isPos ? 50 : 50 - w;
    centerLine = `<line x1="50" y1="0" x2="50" y2="1" stroke="#d0d7de" stroke-width="0.8"/>`;
  } else if (mode === 'allPos') {
    x = 0; w = frac * 100;
  } else {
    w = frac * 100; x = 100 - w;
  }

  return `<svg viewBox="0 0 100 1" preserveAspectRatio="none">
    <rect x="${x.toFixed(2)}" y="0" width="${w.toFixed(2)}" height="1" fill="${fill}"/>
    ${centerLine}</svg>`;
}

// ── Sort state ────────────────────────────────────────────────────────────────
const sortState = {};   // { tbodyId: { col, dir } }  dir: -1=desc, 1=asc
let _series = {}, _changes = {}, _weekly = {}, _intraday = {}, _atrMetrics = {};

function getSortValue(ticker, col, series, changes, weekly, intraday, atrMetrics) {
  if (col === 'sts') {
    const vals = (series[ticker] ?? []).slice(-N_BARS);
    if (!vals.length) return -Infinity;
    const pr = percentRank(vals, vals[vals.length - 1]);
    return pr ?? -Infinity;
  }
  if (col === 'intraday') return intraday[ticker]                ?? -Infinity;
  if (col === 'chg')      return changes[ticker]                 ?? -Infinity;
  if (col === 'weekly')   return weekly[ticker]                  ?? -Infinity;
  if (col === 'atrLow')   return atrMetrics?.[ticker]?.atr_low        ?? -Infinity;
  if (col === 'atrWkChg') return atrMetrics?.[ticker]?.atr_low_wk_chg  ?? -Infinity;
  if (col === 'atrHigh')  return atrMetrics?.[ticker]?.atr_high        ?? -Infinity;
  if (col === 'atrHChg')  return atrMetrics?.[ticker]?.atr_high_wk_chg ?? -Infinity;
  return 0;
}

function updateSortArrows() {
  document.querySelectorAll('th.sortable').forEach(th => {
    const tbodyId = th.dataset.tbody;
    const col     = th.dataset.sort;
    const ss      = sortState[tbodyId];
    const arrow   = th.querySelector('.sort-arrow');
    const active  = ss?.col === col;
    th.classList.toggle('sort-active', active);
    arrow.textContent = active ? (ss.dir === -1 ? ' ▼' : ' ▲') : '';
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function barMode(vals) {
  const hasPos = vals.some(v => v > 0), hasNeg = vals.some(v => v < 0);
  return (hasPos && hasNeg) ? 'butterfly' : hasPos ? 'allPos' : 'allNeg';
}

function renderSection(displayOrder, tbodyId, series, changes, weekly, intraday, atrMetrics) {
  const ss    = sortState[tbodyId];
  const order = ss
    ? [...displayOrder].sort((a, b) =>
        (getSortValue(a.ticker, ss.col, series, changes, weekly, intraday, atrMetrics) -
         getSortValue(b.ticker, ss.col, series, changes, weekly, intraday, atrMetrics)) * ss.dir)
    : displayOrder;

  const allChg      = order.map(({ ticker }) => changes[ticker]).filter(v => v != null);
  const allWeekly   = order.map(({ ticker }) => weekly[ticker]).filter(v => v != null);
  const allIntra    = order.map(({ ticker }) => intraday[ticker]).filter(v => v != null);
  const maxAbsChg   = Math.max(...allChg.map(Math.abs),    0.01);
  const maxAbsWeekly = Math.max(...allWeekly.map(Math.abs), 0.01);
  const maxAbsIntra = Math.max(...allIntra.map(Math.abs),  0.01);
  const chgMode     = barMode(allChg);
  const weeklyMode  = barMode(allWeekly);
  const intraMode   = barMode(allIntra);

  document.getElementById(tbodyId).innerHTML = order.map(({ ticker, market }) => {
    const isSpy  = ticker === 'SPY';
    const raw    = isSpy ? Array(N_BARS).fill(0) : (series[ticker] ?? []);
    const values = raw.slice(-N_BARS);

    // RS_STS%
    let stsHtml = '<span class="num-value">—</span>';
    if (!isSpy && values.length) {
      const pr = percentRank(values, values[values.length - 1]);
      if (pr !== null)
        stsHtml = `<span class="num-value">${Math.round(pr * 100)}%</span>`;
    }

    // Intraday %
    const intra     = intraday[ticker] ?? null;
    const intraText = intra != null ? `${intra >= 0 ? '+' : ''}${intra.toFixed(2)}%` : '—';

    // Daily %
    const chg     = changes[ticker] ?? null;
    const chgText = chg != null ? `${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%` : '—';

    // Weekly %
    const wkly     = weekly[ticker] ?? null;
    const wklyText = wkly != null ? `${wkly >= 0 ? '+' : ''}${wkly.toFixed(2)}%` : '—';

    // ATR metrics
    const m          = atrMetrics?.[ticker];
    const atrLow     = m?.atr_low        ?? null;
    const atrWkChg   = m?.atr_low_wk_chg  ?? null;
    const atrHigh    = m?.atr_high        ?? null;
    const atrHChg    = m?.atr_high_wk_chg ?? null;
    const atrLowHtml = atrLow != null
      ? `<span class="num-value">${atrLow.toFixed(1)}</span>`
      : '<span class="num-value">—</span>';
    const atrWkChgHtml = atrWkChg != null
      ? `<span class="num-value${atrWkChg > 0 ? ' atr-new-high' : atrWkChg < 0 ? ' atr-neg' : ''}">${atrWkChg >= 0 ? '+' : ''}${atrWkChg.toFixed(1)}</span>`
      : '<span class="num-value">—</span>';
    const atrHighHtml = atrHigh != null
      ? `<span class="num-value${atrHigh > 0 ? ' atr-new-high' : ''}">${atrHigh.toFixed(1)}</span>`
      : '<span class="num-value">—</span>';
    const atrHChgHtml = atrHChg != null
      ? `<span class="num-value${atrHChg > 0 ? ' atr-new-high' : atrHChg < 0 ? ' atr-neg' : ''}">${atrHChg >= 0 ? '+' : ''}${atrHChg.toFixed(1)}</span>`
      : '<span class="num-value">—</span>';

    return `<tr class="ticker-row">
      <td class="market-cell"><span class="ticker-symbol">${market}</span></td>
      <td class="index-cell">${ticker}</td>
      <td class="rs-cell">${buildHistogramSVG(values, isSpy)}</td>
      <td class="sts-cell">${stsHtml}</td>
      <td class="chg-cell"><div class="chg-wrap">${buildChgBarSVG(intra, intraMode, maxAbsIntra)}<span class="chg-text">${intraText}</span></div></td>
      <td class="chg-cell"><div class="chg-wrap">${buildChgBarSVG(chg, chgMode, maxAbsChg)}<span class="chg-text">${chgText}</span></div></td>
      <td class="chg-cell"><div class="chg-wrap">${buildChgBarSVG(wkly, weeklyMode, maxAbsWeekly)}<span class="chg-text">${wklyText}</span></div></td>
      <td class="atr-cell">${atrLowHtml}</td>
      <td class="atr-cell">${atrWkChgHtml}</td>
      <td class="atr-cell">${atrHighHtml}</td>
      <td class="atr-cell">${atrHChgHtml}</td>
    </tr>`;
  }).join('');
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(async () => {
  try {
    const [config, latest] = await Promise.all([
      fetch('./data/config.json').then(r => { if (!r.ok) throw new Error(`config HTTP ${r.status}`); return r.json(); }),
      fetch('./data/latest.json').then(r => { if (!r.ok) throw new Error(`data HTTP ${r.status}`);   return r.json(); }),
    ]);

    // Build tables from config
    document.getElementById('dashboard').innerHTML =
      config.sections.map(buildTable).join('');

    if (!latest.date) {
      showStatus('数据尚未生成，等待首次 GitHub Actions 运行（北京时间每日 06:00）。');
      document.getElementById('dashboard').style.display = 'block';
      return;
    }

    document.getElementById('data-date').textContent   = latest.date;
    document.getElementById('update-time').textContent = toBeiJing(latest.updated_at);
    document.getElementById('dashboard').style.display = 'block';

    _series     = latest.vars_series      ?? {};
    _changes    = latest.daily_change     ?? {};
    _weekly     = latest.weekly_change    ?? {};
    _intraday   = latest.intraday_change  ?? {};
    _atrMetrics = latest.atr_metrics      ?? {};

    const TBODY_TO_ORDER = {};
    config.sections.forEach(s => {
      TBODY_TO_ORDER[`${s.id}-body`] = s.rows.map(r => ({ ticker: r.ticker, market: r.label }));
    });

    Object.entries(TBODY_TO_ORDER).forEach(([id, order]) =>
      renderSection(order, id, _series, _changes, _weekly, _intraday, _atrMetrics));

    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const { tbody: tbodyId, sort: col } = th.dataset;
        const cur = sortState[tbodyId];
        sortState[tbodyId] = cur?.col === col ? { col, dir: -cur.dir } : { col, dir: -1 };
        renderSection(TBODY_TO_ORDER[tbodyId], tbodyId, _series, _changes, _weekly, _intraday, _atrMetrics);
        updateSortArrows();
      });
    });

  } catch (err) {
    showStatus('数据加载失败：' + err.message, true);
    console.error(err);
  }
})();
</script>
</body>
</html>
