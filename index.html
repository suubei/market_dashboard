<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Dashboard · VARS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --surface: #f6f8fa;
      --border:  #d0d7de;
      --text:    #1f2328;
      --muted:   #57606a;
      --accent:  #0969da;
      --pos:     #1a7f37;
      --neg:     #cf222e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 28px 15vw 56px;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 0 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }

    #meta {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    #meta b { color: var(--text); }

    /* ── Status banner ── */
    #status {
      max-width: 900px;
      margin: 0 0 20px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      display: none;
    }
    #status.error { border-color: var(--neg); color: var(--neg); }

    /* ── Main table ── */
    #dashboard {
      max-width: 900px;
      margin: 0;
      display: none;
    }

    .ticker-table {
      width: 100%;
      border-collapse: collapse;
    }

    .col-market { width: 100px; }
    .col-index  { width: 80px; }
    .col-rs     { width: 180px; }

    /* Header row */
    .ticker-table thead th {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .ticker-table thead th.col-rs { padding-left: 8px; }

    /* Data rows */
    .ticker-row { border-top: 1px solid var(--border); }
    .ticker-row:last-child { border-bottom: 1px solid var(--border); }

    .ticker-row td {
      padding: 8px 0;
      vertical-align: middle;
    }

    .market-cell { padding-right: 16px; }
    .index-cell  { padding-right: 16px; color: var(--muted); font-size: 0.85rem; }

    .ticker-symbol {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
    }

    .rs-cell { padding-left: 8px; }

    .histogram-wrap svg {
      display: block;
      width: 100%;
      height: 48px;
      overflow: visible;
    }

    /* ── Footer ── */
    footer {
      max-width: 900px;
      margin: 28px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Market Dashboard</h1>
  <div id="meta">
    <span>数据日期：<b id="data-date">—</b></span>
    <span>更新时间：<b id="update-time">—</b>（北京时间）</span>
  </div>
</header>

<div id="status"></div>

<div id="dashboard">
  <table class="ticker-table">
    <colgroup>
      <col class="col-market">
      <col class="col-index">
      <col class="col-rs">
    </colgroup>
    <thead>
      <tr>
        <th class="col-market">Market</th>
        <th class="col-index">Index</th>
        <th class="col-rs">1-Month RS</th>
      </tr>
    </thead>
    <tbody id="ticker-body"></tbody>
  </table>
</div>

<footer>
  <span>数据：<a href="https://www.tiingo.com" target="_blank">Tiingo</a></span>
  <span>每日北京时间 06:00 自动更新</span>
</footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.classList.toggle('error', isError);
}

function toBeiJing(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleString('zh-CN', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
  });
}

// ── Config ────────────────────────────────────────────────────────────────────
// Fixed display order and market labels
const DISPLAY_ORDER = [
  { ticker: 'SPY',  market: 'SPY 500'  },
  { ticker: 'RSP',  market: 'RSP 500'  },
  { ticker: 'QQQ',  market: 'QQQ 100'  },
  { ticker: 'QQQE', market: 'QQQE 100' },
  { ticker: 'IWM',  market: 'IWM 2000' },
  { ticker: 'DIA',  market: 'DIA 30'   },
];

// ── SVG Histogram ─────────────────────────────────────────────────────────────
const VB_W    = 200;   // narrow viewBox
const VB_H    = 48;
const ZERO_Y  = VB_H / 2;          // 24
const MAX_BAR = ZERO_Y - 3;        // 21px max bar height
const N_BARS  = 25;
const SLOT_W  = VB_W / N_BARS;     // 8px per slot
const BAR_W   = SLOT_W - 2;        // 6px bar, 2px gap
const POS_CLR  = '#1a7f37';
const NEG_CLR  = '#cf222e';
const LAST_POS = '#2da44e';
const LAST_NEG = '#e5534b';
const SPY_CLR  = '#8c959f';        // flat neutral for SPY reference

function buildHistogramSVG(values, isSpy) {
  const maxAbs  = isSpy ? 1 : Math.max(...values.filter(v => v !== null).map(Math.abs), 0.01);
  const lastIdx = values.length - 1;

  const bars = values.map((v, i) => {
    if (v === null || v === undefined || isNaN(v)) return '';
    const isPos  = v >= 0;
    const isLast = i === lastIdx;
    const barH   = maxAbs > 0 ? (Math.abs(v) / maxAbs * MAX_BAR) : 0;
    const x      = i * SLOT_W + 1;
    const y      = isPos ? ZERO_Y - barH : ZERO_Y;
    const fill   = isSpy  ? SPY_CLR
                 : isLast ? (isPos ? LAST_POS : LAST_NEG)
                           : (isPos ? POS_CLR  : NEG_CLR);
    const tip    = `${v >= 0 ? '+' : ''}${v.toFixed(4)}`;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${Math.max(barH, 0.5).toFixed(1)}" fill="${fill}" rx="0"><title>${tip}</title></rect>`;
  }).join('');

  return `<svg viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none">
    <line x1="0" y1="${ZERO_Y}" x2="${VB_W}" y2="${ZERO_Y}" stroke="#d0d7de" stroke-width="0.8"/>
    ${bars}
  </svg>`;
}

// ── Render rows ───────────────────────────────────────────────────────────────
function renderDashboard(latest) {
  const series = latest.vars_series ?? {};
  const vars   = latest.vars ?? {};
  const tbody  = document.getElementById('ticker-body');

  tbody.innerHTML = DISPLAY_ORDER.map(({ ticker, market }) => {
    const isSpy  = ticker === 'SPY';
    const values = isSpy ? Array(25).fill(0) : (series[ticker] ?? []);
    const svg    = buildHistogramSVG(values, isSpy);

    return `<tr class="ticker-row">
      <td class="market-cell"><span class="ticker-symbol">${market}</span></td>
      <td class="index-cell">${ticker}</td>
      <td class="rs-cell">
        <div class="histogram-wrap">${svg}</div>
      </td>
    </tr>`;
  }).join('');
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(async () => {
  try {
    const latest = await fetch('./data/latest.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });

    if (!latest.date) {
      showStatus('数据尚未生成，等待首次 GitHub Actions 运行（北京时间每日 06:00）。');
      return;
    }

    document.getElementById('data-date').textContent   = latest.date;
    document.getElementById('update-time').textContent = toBeiJing(latest.updated_at);

    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(latest);

  } catch (err) {
    showStatus('数据加载失败：' + err.message, true);
    console.error(err);
  }
})();
</script>
</body>
</html>
